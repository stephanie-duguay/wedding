<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stephanie & Jeffrey — Our Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Manrope', sans-serif; color: #3a3530; background: #fff; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
::selection { background: #d4b88f; color: #fff; }
@keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.fade-section { opacity:0; transform:translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-section.visible { opacity:1; transform:translateY(0); }

/* NAV */
#main-nav { position:fixed; top:0; left:0; right:0; z-index:1000; padding:20px 24px; transition:all 0.3s ease; }
#main-nav.scrolled { background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border-bottom:1px solid #eee; padding:12px 24px; }
#main-nav .nav-inner { max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
#main-nav .nav-logo { text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:#3a3530; }
#main-nav .nav-links { display:flex; gap:28px; }
#main-nav .nav-links a { text-decoration:none; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:#7a7268; font-weight:400; transition:color 0.2s; }
#main-nav .nav-links a:hover { color:#b8895a; }
#nav-hamburger { display:none; background:none; border:none; cursor:pointer; padding:8px; flex-direction:column; gap:5px; }
#nav-hamburger span { display:block; width:22px; height:1.5px; background:#3a3530; transition:all 0.3s; }
#nav-mobile-menu { display:none; padding:20px 24px; flex-direction:column; gap:16px; background:rgba(255,255,255,0.98); }
#nav-mobile-menu a { text-decoration:none; font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#7a7268; }
@media (max-width:680px) {
  #main-nav .nav-links { display:none !important; }
  #nav-hamburger { display:flex !important; }
  #nav-mobile-menu.open { display:flex !important; }
}

/* SECTIONS */
.section { padding:80px 24px; max-width:860px; margin:0 auto; }
.section-title { text-align:center; margin-bottom:48px; }
.section-title h2 { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,5vw,48px); font-weight:400; letter-spacing:0.02em; color:#3a3530; }
.section-title .sub { font-size:15px; color:#7a7268; margin-top:8px; font-weight:300; }
.section-title .line { width:48px; height:1px; background:#d4b88f; margin:20px auto 0; }
@media (max-width:680px) {
  .section { padding:64px 20px; }
  .section-title { margin-bottom:36px; }
}
@media (max-width:480px) {
  .section { padding:56px 18px; }
  .section-title { margin-bottom:32px; }
}

/* PASSWORD */
#password-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fff 0%,#faf6ef 50%,#f3e8d4 100%); padding:24px; }
#password-screen .inner { text-align:center; opacity:0; transform:translateY(20px); transition:all 0.8s ease; }
#password-screen .inner.show { opacity:1; transform:translateY(0); }
#password-screen .pre-title { font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:#7a7268; margin-bottom:12px; font-weight:400; }
#password-screen h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(40px,8vw,72px); font-weight:300; color:#3a3530; line-height:1.1; }
#password-screen .amp { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; color:#b8895a; }
#password-screen .date { font-size:15px; color:#7a7268; margin-top:12px; font-weight:300; }
#password-screen input { font-family:'Manrope',sans-serif; font-size:15px; padding:14px 24px; border:1px solid #ddd; border-radius:0; outline:none; width:min(260px,80vw); text-align:center; letter-spacing:0.1em; margin-top:40px; transition:border-color 0.3s; }
#password-screen input.error { border-color:#c44; }
#password-screen .enter-btn { display:block; margin:12px auto 0; font-family:'Manrope',sans-serif; font-size:13px; letter-spacing:0.15em; text-transform:uppercase; padding:14px 40px; background:#3a3530; color:#fff; border:none; cursor:pointer; transition:background 0.3s; font-weight:400; }
#password-screen .enter-btn:hover { background:#b8895a; }
#password-screen .err-msg { color:#c44; font-size:13px; margin-top:8px; font-weight:400; min-height:20px; }

/* HERO */
#hero { position:relative; min-height:100vh; min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; text-align:center; padding:24px 24px 80px; overflow:hidden; }
#hero .bg-gradient { position:absolute; inset:0; background:linear-gradient(160deg,#fff 0%,#faf6ef 35%,#f3e8d4 75%,#ebd9b8 100%); }
#hero .bg-image { position:absolute; inset:0; background-size:cover; background-position:center center; }
#hero .bg-overlay { position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.10) 55%, rgba(0,0,0,0.50) 85%, rgba(0,0,0,0.62) 100%); }
#hero .deco-circle { position:absolute; border-radius:50%; border:1px solid #d4b88f; }
#hero .content { position:relative; z-index:1; opacity:0; transform:translateY(30px); transition:all 1s ease; max-width:900px; }
#hero .content.show { opacity:1; transform:translateY(0); }
#hero .sub-text { font-size:13px; letter-spacing:0.25em; text-transform:uppercase; color:#7a7268; margin-bottom:14px; font-weight:300; }
#hero h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(44px,8.5vw,88px); font-weight:300; color:#3a3530; line-height:1.05; }
#hero .amp { font-family:'Cormorant Garamond',serif; font-size:clamp(26px,4.5vw,42px); font-style:italic; font-weight:300; color:#b8895a; margin:2px 0; }
#hero .divider { width:48px; height:1px; background:#d4b88f; margin:20px auto; }
#hero .hero-date { font-size:15px; letter-spacing:0.1em; color:#7a7268; font-weight:300; }
#hero .hero-venue { font-size:13px; color:#7a7268; font-weight:300; margin-top:4px; }
#hero .scroll-line { position:absolute; bottom:20px; width:1px; height:32px; background:#d4b88f; animation:fadeIn 1s ease 1.5s both; }
#hero.has-image .sub-text, #hero.has-image .hero-date { color:rgba(255,255,255,0.95); text-shadow:0 1px 12px rgba(0,0,0,0.6); }
#hero.has-image h1 { color:#fff; text-shadow:0 2px 20px rgba(0,0,0,0.55); }
#hero.has-image .amp { color:#f3e8d4; text-shadow:0 1px 12px rgba(0,0,0,0.55); }
#hero.has-image .hero-venue { color:rgba(255,255,255,0.85); text-shadow:0 1px 12px rgba(0,0,0,0.6); }
#hero.has-image .divider { background:rgba(255,255,255,0.7); }
#hero.has-image .scroll-line { background:rgba(255,255,255,0.75); }
@media (max-width:520px) {
  #hero { padding:24px 20px 64px; }
  #hero .sub-text { font-size:11px; letter-spacing:0.2em; margin-bottom:10px; }
  #hero .hero-date { font-size:14px; }
  #hero .hero-venue { font-size:12px; }
}
@media (min-width:1600px) {
  #hero h1 { font-size:96px; }
}

/* WEDDING DETAILS BLOCK — replaces the old event-card design */
.wedding-details { max-width:680px; margin:0 auto; }
.detail-list { display:flex; flex-direction:column; gap:16px; margin-bottom:32px; }
.detail-row { display:flex; align-items:baseline; gap:24px; padding:14px 0; border-bottom:1px solid #ebe4d4; }
.detail-row:last-child { border-bottom:none; }
.detail-label { font-family:'Manrope',sans-serif; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#b8895a; font-weight:500; flex:0 0 80px; padding-top:2px; }
.detail-value { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:#3a3530; line-height:1.5; flex:1; }
.detail-value .detail-sep { color:#c5b6a3; font-weight:300; margin:0 6px; }
.detail-value .detail-time { white-space:nowrap; }
.detail-value .detail-venue { display:block; }
.detail-value .map-link { display:inline-block; margin-top:4px; color:#b8895a; text-decoration:none; border-bottom:1px solid #d4b88f; padding-bottom:1px; transition:color 0.2s, border-color 0.2s; font-size:16px; }
.detail-value .map-link:hover { color:#3a3530; border-color:#3a3530; }
.detail-value .map-link .map-arrow { font-size:13px; }
.detail-value .detail-address { display:block; margin-top:4px; font-size:16px; color:#7a7268; }
.wedding-desc { font-family:'Manrope',sans-serif; font-size:15px; line-height:1.75; color:#7a7268; font-weight:300; max-width:580px; margin:8px auto 0; text-align:center; padding:0 8px; }

/* RSVP INLINE BLOCK — lives inside the wedding section, no separate destination */
#rsvp-anchor { position:relative; top:-72px; height:0; pointer-events:none; }
.rsvp-block { max-width:560px; margin:48px auto 0; padding:36px 32px; background:#faf6ef; border:1px solid #ebe4d4; }
.rsvp-block-header { text-align:center; margin-bottom:24px; }
.rsvp-block-title { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:400; color:#3a3530; margin-bottom:6px; letter-spacing:0.01em; }
.rsvp-block-deadline { font-family:'Manrope',sans-serif; font-size:13px; color:#7a7268; font-weight:300; }
.rsvp-block-deadline strong { font-weight:500; color:#3a3530; }

/* DIVIDER PHOTO — separates the wedding section from the rest of the page */
.divider-photo { width:100%; aspect-ratio:16/7; max-height:640px; background-size:cover; background-position:center 35%; background-repeat:no-repeat; margin:64px 0; }
@media (max-width:680px) {
  .divider-photo { aspect-ratio:16/9; margin:48px 0; }
}
@media (max-width:480px) {
  .divider-photo { aspect-ratio:4/3; margin:40px 0; }
}

/* CLOSING PHOTOS — triptych grid above footer */
.closing-triptych { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; width:100%; max-width:100%; overflow:hidden; }
.closing-triptych .closing-img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
@media (max-width:600px) {
  .closing-triptych { gap:2px; }
  .closing-triptych .closing-img { aspect-ratio:2/3; }
}

/* DETAIL ROW — mobile adjustments: stack label above value on small screens */
@media (max-width:520px) {
  .detail-row { flex-direction:column; align-items:flex-start; gap:6px; padding:14px 0; }
  .detail-label { flex:none; padding-top:0; }
  .detail-value { flex:none; font-size:18px; line-height:1.45; word-break:break-word; }
  .detail-value .detail-sep { display:none; }
  .detail-value .detail-date { display:block; }
  .detail-value .detail-time { display:block; margin-top:4px; font-size:16px; color:#7a7268; }
  .rsvp-block { padding:28px 22px; margin-top:36px; }
  .rsvp-block-title { font-size:28px; }
  .wedding-desc { font-size:14px; margin-top:4px; }
}

/* TIMELINE — now lives inside the wedding (events) section as a sub-block */
.timeline-inner-block { max-width:520px; margin:56px auto 0; padding:0 16px; }
.timeline-subtitle { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:400; color:#3a3530; text-align:center; margin-bottom:28px; letter-spacing:0.01em; }
.timeline-container { position:relative; }
.timeline-line { position:absolute; left:80px; top:8px; bottom:8px; width:1px; background:#d4b88f; }
.timeline-item { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
.timeline-item:last-child { margin-bottom:0; }
.timeline-item .tl-time { font-size:13px; font-weight:400; color:#7a7268; width:72px; text-align:right; flex-shrink:0; letter-spacing:0.02em; white-space:nowrap; }
.timeline-item .tl-dot { width:9px; height:9px; border-radius:50%; background:#d4b88f; flex-shrink:0; position:relative; z-index:1; border:2px solid #fff; }
.timeline-item .tl-label { font-size:15px; font-weight:300; color:#3a3530; }
@media (max-width:400px) {
  .timeline-inner-block { padding:0 8px; }
  .timeline-line { left:64px; }
  .timeline-item { gap:14px; }
  .timeline-item .tl-time { width:56px; font-size:12px; }
  .timeline-item .tl-label { font-size:14px; }
}

/* RSVP */
.rsvp-block .rsvp-form { max-width:480px; margin:0 auto; }
.rsvp-block label { display:block; margin-bottom:20px; }
.rsvp-block .label-text { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:500; color:#b8895a; margin-bottom:8px; display:block; }
.rsvp-block input[type="text"], .rsvp-block textarea { font-family:'Manrope',sans-serif; font-size:14px; padding:12px 16px; border:1px solid #ddd; border-radius:0; outline:none; width:100%; background:#fff; font-weight:300; transition:border-color 0.2s; }
.rsvp-block input[type="text"]:focus, .rsvp-block textarea:focus { border-color:#b8895a; }
.rsvp-block textarea { resize:vertical; }
.rsvp-party-header { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; margin:28px 0 16px; padding-bottom:8px; border-bottom:1px solid #eee; }
.rsvp-member-card { margin-bottom:20px; padding:20px 24px; background:#faf6ef; border:1px solid #ebe4d4; }
.rsvp-member-card .member-name { font-family:'Manrope',sans-serif; font-size:16px; font-weight:500; margin-bottom:12px; color:#3a3530; }
.rsvp-event-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid #eee; flex-wrap:wrap; }
.rsvp-event-row:last-child { border-bottom:none; }
.rsvp-event-row .ev-label { font-size:14px; color:#3a3530; font-weight:400; flex:1 1 200px; }
.rsvp-event-row .ev-sub { font-size:12px; color:#7a7268; font-weight:300; }
.rsvp-btns { display:flex; flex-direction:column; gap:8px; width:100%; }
.rsvp-btn { display:flex; align-items:center; gap:12px; width:100%; padding:16px 18px; font-family:'Manrope',sans-serif; font-size:15px; font-weight:400; cursor:pointer; border:1.5px solid #ddd; background:#fff; color:#3a3530; transition:all 0.2s; text-align:left; letter-spacing:0; text-transform:none; }
.rsvp-btn .rsvp-icon { font-size:18px; flex-shrink:0; }
.rsvp-btn:hover { border-color:#b8895a; background:#fdf9f4; }
.rsvp-btn.accept-selected { border-color:#b8895a; background:#faf6ef; color:#3a3530; font-weight:500; }
.rsvp-btn.decline-selected { border-color:#999; background:#f7f7f7; color:#7a7268; font-weight:500; }
.rsvp-member-card { margin-bottom:16px; padding:20px 24px; background:#fff; border:1px solid #ebe4d4; transition:all 0.3s; }
.rsvp-member-card .member-name { font-family:'Manrope',sans-serif; font-size:16px; font-weight:500; margin-bottom:14px; color:#3a3530; }
.rsvp-allergy-row { margin-top:12px; }
.rsvp-allergy-row label { display:flex; align-items:center; gap:8px; cursor:pointer; font-family:'Manrope',sans-serif; font-size:13px; color:#7a7268; font-weight:300; }
.rsvp-allergy-row input[type="checkbox"] { width:16px; height:16px; accent-color:#b8895a; cursor:pointer; flex-shrink:0; }
.rsvp-allergy-row input[type="text"] { margin-top:8px; font-family:'Manrope',sans-serif; font-size:13px; padding:10px 14px; border:1px solid #ddd; outline:none; width:100%; background:#fff; font-weight:300; transition:border-color 0.2s; }
.rsvp-allergy-row input[type="text"]:focus { border-color:#b8895a; }
.rsvp-submit-section { margin-top:24px; padding-top:20px; border-top:1px solid #ebe4d4; text-align:center; }
.rsvp-submit-section .submit-hint { font-size:13px; color:#7a7268; font-weight:300; margin-bottom:12px; line-height:1.5; }
.rsvp-submit-section .submit-hint strong { font-weight:500; color:#3a3530; }
#rsvp-submit { width:100%; padding:16px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:400; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; background:#3a3530; color:#fff; border:none; transition:background 0.3s; }
#rsvp-submit:hover { background:#b8895a; }
#rsvp-submit:disabled { opacity:0.6; cursor:wait; }
.rsvp-error { color:#c44; font-size:13px; text-align:center; margin-bottom:12px; min-height:18px; }
@media (max-width:400px) {
  .rsvp-btn { padding:14px 14px; font-size:14px; }
  .rsvp-member-card { padding:16px; }
}
#rsvp-thankyou { text-align:center; padding:40px 0; }
#rsvp-thankyou .ty-emoji { font-size:48px; margin-bottom:16px; }
#rsvp-thankyou h2 { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:400; margin-bottom:16px; color:#3a3530; }
#rsvp-thankyou p { font-size:15px; color:#7a7268; font-weight:300; line-height:1.7; max-width:480px; margin:0 auto; }
#rsvp-thankyou p + p { margin-top:14px; }
#rsvp-thankyou .ty-secondary { font-size:13px; font-style:italic; color:#9a9085; }
.ty-actions { margin-top:24px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.ty-actions .ty-email-btn { display:inline-block; font-family:'Manrope',sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; padding:12px 28px; border:1px solid #d4b88f; background:#fff; color:#b8895a; text-decoration:none; cursor:pointer; transition:all 0.2s; font-weight:400; }
.ty-actions .ty-email-btn:hover { background:#faf6ef; }
.ty-actions .ty-update-note { font-size:12px; color:#9a9085; font-weight:300; max-width:400px; }
.ty-actions .ty-update-note a { color:#b8895a; text-decoration:none; border-bottom:1px solid #d4b88f; }
.rsvp-no-match { text-align:center; padding:20px; color:#7a7268; font-size:14px; font-weight:300; }
.rsvp-no-match a { color:#b8895a; }

/* TRAVEL */
.hotel-card { border:1px solid #eee; transition:box-shadow 0.3s; margin-bottom:20px; overflow:hidden; }
.hotel-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.05); }
.hotel-card .hotel-body { padding:24px 28px; }
.hotel-card h3 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; margin-bottom:6px; }
.hotel-card p { font-size:14px; color:#7a7268; font-weight:300; line-height:1.6; }
.hotel-card .rate { font-size:13px; color:#b8895a; font-weight:400; margin-top:4px; }
.hotel-card a.book-link { display:inline-block; margin-top:12px; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:#3a3530; border-bottom:1px solid #d4b88f; text-decoration:none; padding-bottom:2px; font-weight:400; }
.hotel-card .map-link { display:inline-block; margin-top:8px; color:#b8895a; text-decoration:none; border-bottom:1px solid #d4b88f; padding-bottom:1px; transition:color 0.2s, border-color 0.2s; font-size:14px; font-weight:300; }
.hotel-card .map-link:hover { color:#3a3530; border-color:#3a3530; }
.hotel-card .map-link .map-arrow { font-size:12px; }
@media (max-width:480px) {
  .hotel-card .hotel-body { padding:20px; }
  .hotel-card h3 { font-size:20px; }
}
.booking-steps { padding:24px 28px; background:#faf6ef; border:1px solid #ebe4d4; margin-top:16px; }
.booking-steps h4 { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; margin-bottom:14px; color:#3a3530; }
.booking-steps p { font-size:14px; color:#7a7268; font-weight:300; line-height:1.7; }
.booking-steps p + p { margin-top:10px; }
@media (max-width:480px) {
  .booking-steps { padding:20px; }
  .booking-steps p { font-size:13px; }
}

/* REGISTRY / HONEYMOON FUND */
#registry .reg-msg { text-align:center; font-size:15px; color:#7a7268; font-weight:300; line-height:1.7; max-width:540px; margin:0 auto 32px; }
.fund-options { display:flex; flex-direction:column; gap:16px; max-width:480px; margin:0 auto; }
.fund-option { padding:24px 28px; border:1px solid #eee; transition:box-shadow 0.3s; }
.fund-option:hover { box-shadow:0 4px 20px rgba(0,0,0,0.05); }
.fund-option .fo-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.fund-option .fo-icon { font-size:24px; }
.fund-option h4 { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; }
.fund-option p { font-size:14px; color:#7a7268; font-weight:300; line-height:1.6; }
.fund-option .fo-detail { font-size:13px; color:#3a3530; font-weight:400; margin-top:8px; padding:8px 12px; background:#f7f7f7; font-family:monospace; letter-spacing:0.02em; word-break:break-all; }
.fund-option a.fund-link { display:inline-block; margin-top:12px; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:#3a3530; border-bottom:1px solid #d4b88f; text-decoration:none; padding-bottom:2px; font-weight:400; }

/* FAQ */
#faq { background:#f7f7f7; padding:80px 24px; border-top:1px solid #eee; }
#faq .faq-inner { max-width:640px; margin:0 auto; }
.faq-item { border-bottom:1px solid #eee; }
.faq-item button { width:100%; padding:20px 0; display:flex; justify-content:space-between; align-items:center; background:none; border:none; cursor:pointer; text-align:left; }
.faq-item button .q-text { font-family:'Manrope',sans-serif; font-size:15px; font-weight:400; color:#3a3530; padding-right:16px; }
.faq-item button .q-icon { font-size:18px; color:#d4b88f; transition:transform 0.3s; flex-shrink:0; }
.faq-item .faq-answer { max-height:0; overflow:hidden; transition:max-height 0.4s ease,padding-bottom 0.4s ease; padding-bottom:0; }
.faq-item .faq-answer.open { max-height:300px; padding-bottom:20px; }
.faq-item .faq-answer p { font-size:14px; color:#7a7268; font-weight:300; line-height:1.7; }
@media (max-width:480px) {
  #faq { padding:56px 18px; }
  .faq-item button .q-text { font-size:14px; }
  .faq-item .faq-answer p { font-size:13px; }
}

/* ADMIN */
#admin-panel { padding:40px 24px; max-width:800px; margin:0 auto; }
#admin-login { text-align:center; max-width:400px; margin:0 auto; padding:40px; }
#admin-login h3 { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:400; margin-bottom:16px; }
#admin-login input { font-family:'Manrope',sans-serif; font-size:14px; padding:12px 16px; border:1px solid #ddd; width:100%; text-align:center; margin-bottom:12px; outline:none; }
#admin-login button { font-family:'Manrope',sans-serif; font-size:13px; padding:12px 32px; background:#3a3530; color:#fff; border:none; cursor:pointer; letter-spacing:0.1em; text-transform:uppercase; }
.admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
.admin-header h3 { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:400; }
.admin-header button { font-family:'Manrope',sans-serif; font-size:12px; padding:8px 20px; background:#faf6ef; border:1px solid #d4b88f; cursor:pointer; color:#b8895a; letter-spacing:0.08em; text-transform:uppercase; }
.rsvp-card { padding:20px 24px; border:1px solid #eee; background:#fff; margin-bottom:16px; }
.rsvp-card-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; }
.rsvp-card-header h4 { font-size:16px; font-weight:500; }
.rsvp-card-header .rsvp-date { font-size:11px; color:#7a7268; }
.rsvp-tags { margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; }
.rsvp-tag { padding:4px 12px; font-size:12px; font-weight:400; letter-spacing:0.04em; }
.rsvp-tag.attending { background:#e8f5e9; color:#2e7d32; }
.rsvp-tag.declined { background:#fce4ec; color:#c62828; }
.rsvp-dietary { font-size:13px; color:#7a7268; margin-top:8px; font-weight:300; }
.admin-export-btn { font-family:'Manrope',sans-serif; font-size:12px; padding:8px 20px; background:#3a3530; border:none; cursor:pointer; color:#fff; letter-spacing:0.08em; text-transform:uppercase; margin-left:8px; }
.admin-export-btn:hover { background:#b8895a; }

/* FOOTER */
footer { text-align:center; padding:48px 24px 16px; border-top:1px solid #eee; }

// Probes the photoFolder for images by convention name, then fills CONFIG fields.
// Because a static HTML file can't list a directory, we probe known filenames.
// The function returns a Promise that resolves once all probes finish.

  const folder = (CONFIG.photoFolder || "").replace(/\/+$/, "");
  if (!folder) return Promise.resolve();

  const EXTS = ["jpg", "jpeg", "png", "webp", "gif", "avif"];

  // Probe whether an image URL actually loads

    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(url);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  // Try all extensions for a given base name, return the first that loads
  function findImage(baseName) {
    return EXTS.reduce(
      (chain, ext) => chain.then(found => found || probe(`${folder}/${baseName}.${ext}`)),
      Promise.resolve(null)
    );
  }

  // Probe a numbered sequence: prefix-1.ext, prefix-2.ext, … up to max
  function findNumbered(prefix, max) {
    const results = [];
    let p = Promise.resolve();
    for (let i = 1; i <= max; i++) {
      const idx = i;
      p = p.then(() => findImage(`${prefix}-${idx}`).then(url => { if (url) results.push({ idx, url }); }));
    }
    return p.then(() => results.sort((a, b) => a.idx - b.idx).map(r => r.url));
  }

  return Promise.all([
    // Named roles
    findImage("hero").then(url     => { if (url && !CONFIG.heroImageUrl)       CONFIG.heroImageUrl       = url; }),
    findImage("divider").then(url  => { if (url && !CONFIG.events[0].imageUrl) CONFIG.events[0].imageUrl = url; }),

    // Closing triptych: closing-1, closing-2, closing-3
    findNumbered("closing", 3).then(urls => {
      if (urls.length > 0 && (!CONFIG.closingPhotos || CONFIG.closingPhotos.length === 0)) {
        CONFIG.closingPhotos = urls;
      }
    }),
  ]);
}

// ─── STORAGE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = "wedding_rsvps";
function getLocalRsvps() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch { return []; } }
function saveLocalRsvp(data) {
  const all = getLocalRsvps();
  const idx = all.findIndex(r => r.guestName === data.guestName);
  if (idx >= 0) all[idx] = data; else all.push(data);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}
async function saveRsvpToSheets(data) {
  if (!CONFIG.googleSheetsUrl) { saveLocalRsvp(data); return true; }
  try {
    await fetch(CONFIG.googleSheetsUrl, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data) });
    saveLocalRsvp(data);
    return true;
  } catch(err) { console.warn("Sheets save failed:",err); saveLocalRsvp(data); return true; }
}
async function getAllRsvps() {
  if (CONFIG.googleSheetsUrl) {
    try { const r = await fetch(CONFIG.googleSheetsUrl); const j = await r.json(); if (j.success && j.rsvps) return j.rsvps; } catch(e) { console.warn("Sheets fetch failed:",e); }
  }
  return getLocalRsvps();
}

// ─── SITE LOGIC ────────────────────────────────────────────────────────────────
function initSiteLogic() {
  setTimeout(() => { const hc = document.getElementById("hero-content"); if (hc) hc.classList.add("show"); }, 200);
  window.addEventListener("scroll", () => { const nav = document.getElementById("main-nav"); if (nav) nav.classList.toggle("scrolled", window.scrollY > 50); });

  // Hamburger
  const hamburger = document.getElementById("nav-hamburger"), mobileMenu = document.getElementById("nav-mobile-menu");
  if (hamburger) {
    hamburger.addEventListener("click", () => mobileMenu.classList.toggle("open"));
    mobileMenu.querySelectorAll("a").forEach(a => a.addEventListener("click", () => mobileMenu.classList.remove("open")));
  }

  // Fade-in
  const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } }); }, { threshold:0.12 });
  document.querySelectorAll(".fade-section").forEach(el => obs.observe(el));

  // ─── PARTY-BASED RSVP ───
  const searchInput = document.getElementById("party-search");
  if (searchInput) { // Only runs when RSVP form is open (not past deadline)

  const partyResults = document.getElementById("party-results");
  const partyForm = document.getElementById("rsvp-party-form");
  const membersDiv = document.getElementById("rsvp-members");
  let currentParty = null;
  window._rsvpResponses = {};  // { "memberName": { "eventId": "accept"|"decline" } }

  let searchTimeout;
  searchInput.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    const val = searchInput.value.trim().toLowerCase();
    partyForm.style.display = "none";
    currentParty = null;
    window._rsvpResponses = {};

    if (val.length < 2) { partyResults.innerHTML = ""; return; }

    searchTimeout = setTimeout(() => {
      const matches = CONFIG.guestParties.filter(p => {
        // Match against party name and all member names
        const searchable = [p.partyName, ...p.members.map(m => m.name)].join(" ").toLowerCase();
        return searchable.includes(val);
      });

      if (matches.length === 0) {
        partyResults.innerHTML = `<p class="rsvp-no-match">We couldn't find your name on the guest list. Please try a different spelling, or <a href="mailto:${CONFIG.contactEmail || ''}">contact us</a> for help.</p>`;
      } else if (matches.length === 1) {
        selectParty(matches[0]);
        partyResults.innerHTML = "";
      } else {
        partyResults.innerHTML = matches.map(p =>
          `<div style="padding:12px 16px;border:1px solid #eee;margin-bottom:8px;cursor:pointer;transition:background 0.2s" onmouseover="this.style.background='#faf6ef'" onmouseout="this.style.background='#fff'" onclick="selectPartyByName('${p.partyName}')">
            <strong style="font-size:15px">The ${p.partyName} Party</strong>
            <span style="font-size:13px;color:#7a7268;margin-left:8px">(${p.members.map(m=>m.name.split(' ')[0]).join(', ')})</span>
          </div>`
        ).join("");
      }
    }, 300);
  });

  window.selectPartyByName = function(name) {
    const party = CONFIG.guestParties.find(p => p.partyName === name);
    if (party) { selectParty(party); partyResults.innerHTML = ""; }
  };

  function selectParty(party) {
    currentParty = party;
    window._rsvpResponses = {};
    partyForm.style.display = "block";

    let membersHtml = `<h3 class="rsvp-party-header">The ${party.partyName} Party</h3>`;
    if (party.members.length > 1) {
      membersHtml += `<p style="font-size:14px;color:#7a7268;font-weight:300;line-height:1.6;margin-bottom:16px">Select a response for each person, then press <strong style="font-weight:500;color:#3a3530">Submit</strong> at the bottom.</p>`;
    } else {
      membersHtml += `<p style="font-size:14px;color:#7a7268;font-weight:300;line-height:1.6;margin-bottom:16px">Will you be joining us? Select your response and press <strong style="font-weight:500;color:#3a3530">Submit</strong>.</p>`;
    }

    const ev = CONFIG.events[0];
    party.members.forEach((member, idx) => {
      window._rsvpResponses[member.name] = {};
      membersHtml += `<div class="rsvp-member-card" id="member-card-${idx}">
        <div class="member-name">${member.name}</div>
        <div class="rsvp-btns">
          <button class="rsvp-btn" onclick="selectResponse(${idx},'accept')" id="btn-accept-${idx}">
            <span class="rsvp-icon">🎉</span> Joyfully Accepts
          </button>
          <button class="rsvp-btn" onclick="selectResponse(${idx},'decline')" id="btn-decline-${idx}">
            <span class="rsvp-icon">😔</span> Regretfully Declines
          </button>
        </div>
        <div class="rsvp-allergy-row">
          <label><input type="checkbox" id="allergy-check-${idx}" onchange="toggleAllergy(${idx})"> Allergies or dietary needs</label>
          <input type="text" id="allergy-text-${idx}" placeholder="e.g. Nut allergy, vegetarian…" style="display:none">
        </div>
      </div>`;
    });

    membersDiv.innerHTML = membersHtml;

    // Show submit section
    document.getElementById("rsvp-submit-wrap").style.display = "block";
  }

  // Select response (does NOT save yet — just highlights)
  window.selectResponse = function(idx, val) {
    const member = currentParty.members[idx];
    const ev = CONFIG.events[0];
    const acceptBtn = document.getElementById(`btn-accept-${idx}`);
    const declineBtn = document.getElementById(`btn-decline-${idx}`);

    acceptBtn.classList.remove('accept-selected', 'decline-selected');
    declineBtn.classList.remove('accept-selected', 'decline-selected');

    if (val === 'accept') {
      acceptBtn.classList.add('accept-selected');
    } else {
      declineBtn.classList.add('decline-selected');
    }
    window._rsvpResponses[member.name] = { [ev.id]: val };
  };

  window.toggleAllergy = function(idx) {
    const check = document.getElementById(`allergy-check-${idx}`);
    const text = document.getElementById(`allergy-text-${idx}`);
    text.style.display = check.checked ? 'block' : 'none';
    if (!check.checked) text.value = '';
  };

  // Submit all responses at once
  document.getElementById("rsvp-submit").addEventListener("click", async () => {
    if (!currentParty) return;
    const errorEl = document.getElementById("rsvp-error");
    errorEl.textContent = "";

    const ev = CONFIG.events[0];
    const answeredMembers = [];
    const unansweredMembers = [];

    for (let i = 0; i < currentParty.members.length; i++) {
      const member = currentParty.members[i];
      const responses = window._rsvpResponses[member.name] || {};
      if (responses[ev.id]) {
        answeredMembers.push({ member, idx: i });
      } else {
        unansweredMembers.push(member);
      }
    }

    if (answeredMembers.length === 0) {
      errorEl.textContent = "Please select a response for at least one person before submitting.";
      return;
    }

    const submitBtn = document.getElementById("rsvp-submit");
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending…";

    const submittedData = [];
    for (const { member, idx } of answeredMembers) {
      const allergyText = document.getElementById(`allergy-text-${idx}`);
      const dietary = allergyText ? allergyText.value.trim() : "";
      const data = {
        guestName: member.name,
        partyName: currentParty.partyName,
        responses: [{ eventId: ev.id, eventName: ev.name, attending: window._rsvpResponses[member.name][ev.id] }],
        dietaryRestrictions: dietary,
        submittedAt: new Date().toISOString(),
      };
      await saveRsvpToSheets(data);
      submittedData.push(data);
    }

    // Show thank you
    document.getElementById("rsvp-form").style.display = "none";
    document.getElementById("rsvp-thankyou").style.display = "block";
    const rsvpHeader = document.getElementById("rsvp-header");
    if (rsvpHeader) rsvpHeader.style.display = "none";

    const firstName = answeredMembers[0].member.name.split(" ")[0];
    const isMultiSubmit = answeredMembers.length > 1;

    let anyAttending = false, allDeclining = true;
    for (const d of submittedData) {
      for (const r of d.responses) {
        if (r.attending === "accept") { anyAttending = true; allDeclining = false; }
      }
    }

    const tyHeadline = document.getElementById("ty-headline");
    const tyMessage = document.getElementById("ty-message");
    const unansweredNames = unansweredMembers.map(m => m.name.split(" ")[0]);
    const skippedNote = unansweredNames.length > 0
      ? `<p class="ty-secondary">${unansweredNames.join(" and ")} can still RSVP separately using this same website.</p>`
      : "";

    if (anyAttending) {
      tyHeadline.textContent = isMultiSubmit ? "We can't wait to see you!" : `We can't wait to see you, ${firstName}!`;
      tyMessage.innerHTML = `<p>Thank you${isMultiSubmit ? ` to the ${currentParty.partyName} party` : ""} for your RSVP — we've received your response.</p>${skippedNote}`;
    } else if (allDeclining) {
      tyHeadline.textContent = "Thank you for letting us know";
      tyMessage.innerHTML = `<p>We're sorry${isMultiSubmit ? ` the ${currentParty.partyName} party` : ` you, ${firstName},`} won't be able to make it — you'll be missed!</p>${skippedNote}<p class="ty-secondary">We hope to celebrate with you another time.</p>`;
    } else {
      tyHeadline.textContent = "Thank you for your RSVP";
      tyMessage.innerHTML = `<p>We've received the response for the ${currentParty.partyName} party. We can't wait to celebrate with those of you who can join us!</p>${skippedNote}`;
    }

    // Build confirmation data for PDF
    const responseRows = [];
    submittedData.forEach(d => {
      d.responses.forEach(r => {
        responseRows.push({ name: d.guestName, attending: r.attending === "accept", dietary: d.dietaryRestrictions || "" });
      });
    });

    window._confirmationData = {
      partner1: CONFIG.partner1FirstName,
      partner2: CONFIG.partner2FirstName,
      responses: responseRows,
      date: CONFIG.events[0].date,
      time: CONFIG.events[0].time,
      venue: CONFIG.weddingVenue,
      address: CONFIG.weddingAddress,
      deadline: CONFIG.rsvpDeadlineDisplay,
      websiteUrl: window.location.href.split('#')[0],
    };

    const actionsEl = document.getElementById("ty-actions");
    let actionsHtml = `<button class="ty-email-btn" onclick="downloadConfirmation()" style="cursor:pointer">Download Confirmation</button>`;
    const contactLink = CONFIG.contactEmail
      ? `<a href="mailto:${CONFIG.contactEmail}">send us a message</a>`
      : "send us a message";
    actionsHtml += `<p class="ty-update-note">Need to update your RSVP? Just revisit this page and re-enter your last name, or ${contactLink}.</p>`;
    actionsEl.innerHTML = actionsHtml;
  });

  } // end RSVP form logic

  // Admin
  let adminOpen = false;
  document.getElementById("admin-toggle").addEventListener("click", () => {
    adminOpen = !adminOpen;
    if (adminOpen) { showAdminLogin(); document.getElementById("admin-toggle").textContent = "← Back to site"; }
    else { document.getElementById("admin-panel").style.display = "none"; document.getElementById("admin-toggle").textContent = "•"; }
  });

function downloadConfirmation() {
  if (!window._confirmationData) { alert('No confirmation data found. Please try again.'); return; }

  // jsPDF UMD can export as window.jspdf.jsPDF or window.jsPDF depending on version
  var JsPDFConstructor = null;
  if (window.jspdf && window.jspdf.jsPDF) { JsPDFConstructor = window.jspdf.jsPDF; }
  else if (window.jsPDF) { JsPDFConstructor = window.jsPDF; }

  if (!JsPDFConstructor) {
    alert('PDF library failed to load. Please check your internet connection and refresh the page.');
    return;
  }

  var btn = document.querySelector('#ty-actions .ty-email-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }

  try {
    var d = window._confirmationData;

    var pw = 148, margin = 18, cw = pw - margin * 2, cx = pw / 2;

    // Count rows for height estimation
    var dietaryRows = 0;
    d.responses.forEach(function(r) { if (r.dietary) dietaryRows++; });
    var rowH = 8;
    var totalH = 150 + d.responses.length * (rowH + 1) + dietaryRows * 6;
    var ph = Math.max(totalH, 150);

    var pdf = new JsPDFConstructor({ unit: 'mm', format: [pw, ph] });

    // Colors
    var GOLD = [184, 137, 90], DARK = [58, 53, 48], MID = [122, 114, 104];
    var LINE = [212, 184, 143], BORDER = [235, 228, 212], BG = [247, 244, 239];

    // Background
    pdf.setFillColor(BG[0], BG[1], BG[2]);
    pdf.rect(0, 0, pw, ph, 'F');

    // White card
    pdf.setFillColor(255, 255, 255);
    pdf.rect(8, 8, pw - 16, ph - 16, 'F');
    pdf.setDrawColor(BORDER[0], BORDER[1], BORDER[2]);
    pdf.setLineWidth(0.3);
    pdf.rect(8, 8, pw - 16, ph - 16, 'S');

    var y = 14;

    // Photo banner
    try {
      pdf.addImage(CONFIRMATION_PHOTO, 'JPEG', 10, y, pw - 20, 22, undefined, 'FAST');
      y += 25;
    } catch(e) { y += 2; }

    // Couple names
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(18);
    pdf.setTextColor(DARK[0], DARK[1], DARK[2]);
    pdf.text(d.partner1 + '  ', cx, y, { align: 'right' });
    pdf.setFontSize(14);
    pdf.setTextColor(GOLD[0], GOLD[1], GOLD[2]);
    pdf.text('&', cx, y, { align: 'center' });
    pdf.setFontSize(18);
    pdf.setTextColor(DARK[0], DARK[1], DARK[2]);
    pdf.text('  ' + d.partner2, cx, y, { align: 'left' });
    y += 5;

    // Gold line
    pdf.setDrawColor(LINE[0], LINE[1], LINE[2]);
    pdf.setLineWidth(0.3);
    pdf.line(cx - 12, y, cx + 12, y);
    y += 5;

    // Subtitle
    pdf.setFontSize(7);
    pdf.setTextColor(MID[0], MID[1], MID[2]);
    pdf.text('RSVP CONFIRMATION', cx, y, { align: 'center' });
    y += 8;

    // Response rows
    d.responses.forEach(function(r, i) {
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(9.5);
      pdf.setTextColor(DARK[0], DARK[1], DARK[2]);
      pdf.text(r.name, margin + 2, y);

      var label = r.attending ? 'ACCEPTS' : 'DECLINES';
      var bc = r.attending ? GOLD : MID;
      pdf.setFontSize(5.5);
      pdf.setTextColor(bc[0], bc[1], bc[2]);
      var tw = pdf.getTextWidth(label);
      var bx = pw - margin - 2 - tw - 4;
      pdf.setDrawColor(bc[0], bc[1], bc[2]);
      pdf.setLineWidth(0.2);
      pdf.rect(bx, y - 3, tw + 4, 5, 'S');
      pdf.text(label, bx + 2, y);

      // Per-person dietary
      if (r.dietary) {
        y += 5;
        pdf.setFontSize(7);
        pdf.setTextColor(MID[0], MID[1], MID[2]);
        pdf.setFont('helvetica', 'italic');
        pdf.text(r.dietary, margin + 6, y);
        pdf.setFont('helvetica', 'normal');
      }

      y += rowH;

      if (i < d.responses.length - 1) {
        pdf.setDrawColor(240, 236, 228);
        pdf.setLineWidth(0.1);
        pdf.line(margin, y - 3.5, pw - margin, y - 3.5);
      }
    });

    y += 4;

    // Divider
    pdf.setDrawColor(BORDER[0], BORDER[1], BORDER[2]);
    pdf.setLineWidth(0.2);
    pdf.line(margin, y, pw - margin, y);
    y += 6;

    // When & Where
    pdf.setFontSize(8.5);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(DARK[0], DARK[1], DARK[2]);
    pdf.text(d.date + '  ·  ' + d.time, cx, y, { align: 'center' });
    y += 4.5;
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(7.5);
    pdf.setTextColor(MID[0], MID[1], MID[2]);
    var venueLines = pdf.splitTextToSize(d.venue + '  ·  ' + d.address, cw);
    pdf.text(venueLines, cx, y, { align: 'center' });
    y += venueLines.length * 3.5 + 5;

    // Change note
    pdf.setFontSize(6.5);
    pdf.text('Need to make changes? Re-enter your last name before ' + d.deadline + '.', cx, y, { align: 'center' });
    y += 5;

    // Website link
    pdf.setTextColor(GOLD[0], GOLD[1], GOLD[2]);
    pdf.setFontSize(6.5);
    var linkLabel = d.websiteUrl.replace(/^https?:\/\//, '').replace(/\/+$/, '');
    var lw = pdf.getTextWidth(linkLabel);
    pdf.textWithLink(linkLabel, cx - lw / 2, y, { url: d.websiteUrl });
    pdf.setDrawColor(GOLD[0], GOLD[1], GOLD[2]);
    pdf.setLineWidth(0.12);
    pdf.line(cx - lw / 2, y + 0.5, cx + lw / 2, y + 0.5);

    pdf.save('rsvp-confirmation.pdf');
  } catch (err) {
    console.error('PDF generation failed:', err);
    alert('Something went wrong generating the PDF. Error: ' + err.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Download Confirmation'; }
  }
}

// ─── FAQ ───────────────────────────────────────────────────────────────────────
function toggleFaq(btn) {
  const answer = btn.nextElementSibling, icon = btn.querySelector(".q-icon");
  const isOpen = answer.classList.contains("open");
  answer.classList.toggle("open");
  icon.style.transform = isOpen ? "none" : "rotate(45deg)";
}

// ─── ADMIN ─────────────────────────────────────────────────────────────────────
function showAdminLogin() {
  const panel = document.getElementById("admin-panel");
  panel.style.display = "block";
  panel.innerHTML = `<div id="admin-login"><h3>Admin: View RSVPs</h3><input type="password" id="admin-pw" placeholder="Admin password"><br><button onclick="adminLogin()">View RSVPs</button></div>`;
  document.getElementById("admin-pw").addEventListener("keydown", e => { if (e.key === "Enter") adminLogin(); });
}
function adminLogin() {
  if (document.getElementById("admin-pw").value !== CONFIG.adminPassword) return;
  showAdminDashboard();
}
async function showAdminDashboard() {
  const panel = document.getElementById("admin-panel");
  panel.innerHTML = '<p style="color:#7a7268;text-align:center;padding:40px">Loading RSVPs…</p>';
  const rsvps = await getAllRsvps();
  const eventNames = {}; CONFIG.events.forEach(e => { eventNames[e.id] = e.name; });
  let cards = "";
  if (rsvps.length === 0) { cards = '<p style="color:#7a7268">No RSVPs yet.</p>'; }
  else {
    rsvps.forEach(r => {
      let tags = "";
      (r.responses||[]).forEach(resp => {
        if (resp.attending === "n/a") return;
        const cls = resp.attending === "accept" ? "attending" : "declined";
        const label = resp.attending === "accept" ? "✓ Attending" : "✗ Declined";
        tags += `<span class="rsvp-tag ${cls}">${eventNames[resp.eventId]||resp.eventId}: ${label}</span>`;
      });
      const dateStr = r.submittedAt ? new Date(r.submittedAt).toLocaleDateString() : "";
      cards += `<div class="rsvp-card"><div class="rsvp-card-header"><h4>${r.guestName}${r.partyName?` <span style="font-size:12px;color:#7a7268;font-weight:300">(${r.partyName})</span>`:""}</h4><span class="rsvp-date">${dateStr}</span></div><div class="rsvp-tags">${tags}</div>${r.dietaryRestrictions?`<p class="rsvp-dietary">🍽 ${r.dietaryRestrictions}</p>`:""}</div>`;
    });
  }
  const sheetsStatus = CONFIG.googleSheetsUrl ? '<span style="color:#2e7d32;font-size:12px">● Connected to Google Sheets</span>' : '<span style="color:#c44;font-size:12px">● Local storage only</span>';
  panel.innerHTML = `<div class="admin-header"><div><h3>RSVP Responses (${rsvps.length})</h3>${sheetsStatus}</div><div><button onclick="showAdminDashboard()">Refresh</button><button class="admin-export-btn" onclick="exportRsvpsCsv()">Export CSV</button></div></div>${cards}`;
}
async function exportRsvpsCsv() {
  const rsvps = await getAllRsvps();
  if (rsvps.length === 0) return;
  const allEventIds = CONFIG.events.map(e => e.id);
  const eventNames = {}; CONFIG.events.forEach(e => { eventNames[e.id] = e.name; });
  let csv = "Guest Name,Party," + allEventIds.map(id => eventNames[id]).join(",") + ",Dietary Restrictions,Submitted\n";
  rsvps.forEach(r => {
    const respMap = {}; (r.responses||[]).forEach(resp => { respMap[resp.eventId] = resp.attending; });
    const row = [`"${r.guestName}"`,`"${r.partyName||""}"`, ...allEventIds.map(id => respMap[id]==="accept"?"Attending":respMap[id]==="decline"?"Declined":"N/A"), `"${(r.dietaryRestrictions||"").replace(/"/g,'""')}"`, r.submittedAt?new Date(r.submittedAt).toLocaleDateString():""];
    csv += row.join(",") + "\n";
  });
  const blob = new Blob([csv],{type:"text/csv"}); const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "rsvp_responses.csv"; a.click(); URL.revokeObjectURL(url);
}

  discoverPhotos().then(() => { renderPasswordScreen(); });
