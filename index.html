<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jane & John — Our Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Outfit', sans-serif; color: #2c2c2c; background: #fff; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
::selection { background: #e8b4b8; color: #fff; }
@keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.fade-section { opacity:0; transform:translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-section.visible { opacity:1; transform:translateY(0); }

/* NAV */
#main-nav { position:fixed; top:0; left:0; right:0; z-index:1000; padding:20px 24px; transition:all 0.3s ease; }
#main-nav.scrolled { background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border-bottom:1px solid #eee; padding:12px 24px; }
#main-nav .nav-inner { max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
#main-nav .nav-logo { text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:#2c2c2c; }
#main-nav .nav-links { display:flex; gap:28px; }
#main-nav .nav-links a { text-decoration:none; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:#6b6b6b; font-weight:400; transition:color 0.2s; }
#main-nav .nav-links a:hover { color:#d4a0a5; }
#nav-hamburger { display:none; background:none; border:none; cursor:pointer; padding:8px; flex-direction:column; gap:5px; }
#nav-hamburger span { display:block; width:22px; height:1.5px; background:#2c2c2c; transition:all 0.3s; }
#nav-mobile-menu { display:none; padding:20px 24px; flex-direction:column; gap:16px; background:rgba(255,255,255,0.98); }
#nav-mobile-menu a { text-decoration:none; font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#6b6b6b; }
@media (max-width:680px) {
  #main-nav .nav-links { display:none !important; }
  #nav-hamburger { display:flex !important; }
  #nav-mobile-menu.open { display:flex !important; }
}

/* SECTIONS */
.section { padding:80px 24px; max-width:860px; margin:0 auto; }
.section-title { text-align:center; margin-bottom:48px; }
.section-title h2 { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,5vw,48px); font-weight:400; letter-spacing:0.02em; color:#2c2c2c; }
.section-title .sub { font-size:15px; color:#6b6b6b; margin-top:8px; font-weight:300; }
.section-title .line { width:48px; height:1px; background:#e8b4b8; margin:20px auto 0; }

/* PASSWORD */
#password-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#fff 0%,#fdf2f3 100%); padding:24px; }
#password-screen .inner { text-align:center; opacity:0; transform:translateY(20px); transition:all 0.8s ease; }
#password-screen .inner.show { opacity:1; transform:translateY(0); }
#password-screen .pre-title { font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:#6b6b6b; margin-bottom:12px; font-weight:400; }
#password-screen h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(40px,8vw,72px); font-weight:300; color:#2c2c2c; line-height:1.1; }
#password-screen .amp { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; color:#d4a0a5; }
#password-screen .date { font-size:15px; color:#6b6b6b; margin-top:12px; font-weight:300; }
#password-screen input { font-family:'Outfit',sans-serif; font-size:15px; padding:14px 24px; border:1px solid #ddd; border-radius:0; outline:none; width:260px; text-align:center; letter-spacing:0.1em; margin-top:40px; transition:border-color 0.3s; }
#password-screen input.error { border-color:#c44; }
#password-screen .enter-btn { display:block; margin:12px auto 0; font-family:'Outfit',sans-serif; font-size:13px; letter-spacing:0.15em; text-transform:uppercase; padding:14px 40px; background:#2c2c2c; color:#fff; border:none; cursor:pointer; transition:background 0.3s; font-weight:400; }
#password-screen .enter-btn:hover { background:#d4a0a5; }
#password-screen .err-msg { color:#c44; font-size:13px; margin-top:8px; font-weight:400; min-height:20px; }

/* HERO */
#hero { position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; overflow:hidden; }
#hero .bg-gradient { position:absolute; inset:0; background:linear-gradient(160deg,#fff 0%,#fdf2f3 40%,#fce4e8 100%); }
#hero .bg-image { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.7); }
#hero .deco-circle { position:absolute; border-radius:50%; border:1px solid #e8b4b8; }
#hero .content { position:relative; z-index:1; opacity:0; transform:translateY(30px); transition:all 1s ease; }
#hero .content.show { opacity:1; transform:translateY(0); }
#hero .sub-text { font-size:13px; letter-spacing:0.25em; text-transform:uppercase; color:#6b6b6b; margin-bottom:16px; font-weight:300; }
#hero h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(48px,10vw,100px); font-weight:300; color:#2c2c2c; line-height:1.05; }
#hero .amp { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,5vw,48px); font-style:italic; font-weight:300; color:#d4a0a5; margin:4px 0; }
#hero .divider { width:60px; height:1px; background:#e8b4b8; margin:28px auto; }
#hero .hero-date { font-size:16px; letter-spacing:0.1em; color:#6b6b6b; font-weight:300; }
#hero .hero-venue { font-size:14px; color:#6b6b6b; font-weight:300; margin-top:4px; }
#hero .scroll-line { position:absolute; bottom:32px; width:1px; height:40px; background:#e8b4b8; animation:fadeIn 1s ease 1.5s both; }
#hero.has-image .sub-text, #hero.has-image .hero-date { color:rgba(255,255,255,0.9); }
#hero.has-image h1 { color:#fff; }
#hero.has-image .hero-venue { color:rgba(255,255,255,0.7); }

/* PHOTO GALLERY */
#photos .gallery-grid { display:grid; gap:16px; }
#photos .gallery-grid img { width:100%; height:100%; object-fit:cover; transition:transform 0.6s ease; }
#photos .gallery-grid img:hover { transform:scale(1.03); }
#photos .gallery-item { overflow:hidden; }

/* EVENT CARDS */
.event-card { background:#fff; border:1px solid #eee; transition:box-shadow 0.3s; position:relative; margin-bottom:32px; overflow:hidden; }
.event-card:hover { box-shadow:0 8px 30px rgba(0,0,0,0.06); }
.event-card .event-image { width:100%; height:200px; background-size:cover; background-repeat:no-repeat; position:relative; }
.event-card .event-image::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.4) 100%); }
.event-card .event-image .ev-name-overlay { position:absolute; bottom:16px; left:24px; z-index:1; font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:400; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.3); }
.event-card .event-details { padding:28px 28px 24px; }
.event-card .event-meta { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid #f0f0f0; }
.event-card .event-meta-item { display:flex; align-items:flex-start; gap:6px; font-size:13px; color:#6b6b6b; font-weight:300; }
.event-card .event-meta-item strong { font-weight:500; color:#2c2c2c; }
.event-card .event-desc { font-size:14px; color:#6b6b6b; line-height:1.7; font-weight:300; }
.event-card .event-note { font-size:13px; color:#d4a0a5; font-style:italic; margin-top:12px; font-weight:400; }
.event-card .dresscode { display:inline-block; margin-top:12px; padding:4px 12px; background:#fdf2f3; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-weight:400; color:#d4a0a5; }
.event-card .no-image-header { padding:24px 28px 0; }
.event-card .no-image-header h3 { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:400; }

/* VENUE */
.venue-features { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-top:32px; }
.venue-feature { text-align:center; padding:24px 16px; background:#fdf2f3; border:1px solid #f0e0e2; }
.venue-feature .vf-icon { font-size:28px; margin-bottom:8px; }
.venue-feature h4 { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; margin-bottom:4px; }
.venue-feature p { font-size:13px; color:#6b6b6b; font-weight:300; line-height:1.5; }
.venue-photo { width:100%; aspect-ratio:16/9; overflow:hidden; margin-bottom:24px; }
.venue-photo img { width:100%; height:100%; object-fit:cover; }
.venue-directions { padding:24px 28px; background:#f7f7f7; border:1px solid #eee; margin-top:24px; }
.venue-directions h4 { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; margin-bottom:8px; }
.venue-directions p { font-size:14px; color:#6b6b6b; font-weight:300; line-height:1.7; }
.venue-directions strong { font-weight:500; color:#2c2c2c; }

/* TIMELINE */
#timeline { background:#fdf2f3; padding:80px 24px; border-top:1px solid #f0e0e2; border-bottom:1px solid #f0e0e2; }
#timeline .timeline-inner { max-width:600px; margin:0 auto; }
.timeline-container { position:relative; }
.timeline-line { position:absolute; left:60px; top:8px; bottom:8px; width:1px; background:#e8b4b8; }
.timeline-item { display:flex; align-items:center; gap:24px; margin-bottom:28px; }
.timeline-item:last-child { margin-bottom:0; }
.timeline-item .tl-time { font-size:13px; font-weight:400; color:#6b6b6b; width:52px; text-align:right; flex-shrink:0; letter-spacing:0.02em; }
.timeline-item .tl-dot { width:9px; height:9px; border-radius:50%; background:#e8b4b8; flex-shrink:0; position:relative; z-index:1; border:2px solid #fdf2f3; }
.timeline-item .tl-label { font-size:15px; font-weight:300; color:#2c2c2c; }

/* RSVP */
#rsvp .rsvp-form { max-width:560px; margin:0 auto; }
#rsvp label { display:block; margin-bottom:24px; }
#rsvp .label-text { font-size:12px; letter-spacing:0.1em; text-transform:uppercase; font-weight:400; color:#6b6b6b; margin-bottom:6px; display:block; }
#rsvp input[type="text"], #rsvp textarea { font-family:'Outfit',sans-serif; font-size:14px; padding:12px 16px; border:1px solid #ddd; border-radius:0; outline:none; width:100%; background:#fff; font-weight:300; transition:border-color 0.2s; }
#rsvp textarea { resize:vertical; }
.rsvp-party-header { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; margin:28px 0 16px; padding-bottom:8px; border-bottom:1px solid #eee; }
.rsvp-member-card { margin-bottom:20px; padding:20px 24px; background:#f7f7f7; border:1px solid #eee; }
.rsvp-member-card .member-name { font-family:'Outfit',sans-serif; font-size:16px; font-weight:500; margin-bottom:12px; color:#2c2c2c; }
.rsvp-event-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid #eee; flex-wrap:wrap; }
.rsvp-event-row:last-child { border-bottom:none; }
.rsvp-event-row .ev-label { font-size:14px; color:#2c2c2c; font-weight:400; flex:1 1 200px; }
.rsvp-event-row .ev-sub { font-size:12px; color:#6b6b6b; font-weight:300; }
.rsvp-btns { display:flex; gap:8px; flex-shrink:0; }
.rsvp-btn { padding:8px 14px; font-family:'Outfit',sans-serif; font-size:12px; font-weight:400; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; border:1px solid #ddd; background:#fff; color:#6b6b6b; transition:all 0.2s; }
.rsvp-btn.accept-selected { border-color:#e8b4b8; background:#fdf2f3; color:#d4a0a5; }
.rsvp-btn.decline-selected { border-color:#ccc; background:#f5f5f5; color:#6b6b6b; }
#rsvp-submit { width:100%; padding:16px; font-family:'Outfit',sans-serif; font-size:13px; font-weight:400; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; background:#2c2c2c; color:#fff; border:none; transition:background 0.3s; }
#rsvp-submit:hover { background:#d4a0a5; }
#rsvp-submit:disabled { opacity:0.6; cursor:wait; }
.rsvp-error { color:#c44; font-size:13px; text-align:center; margin-bottom:12px; min-height:18px; }
#rsvp-thankyou { text-align:center; padding:40px 0; }
#rsvp-thankyou .ty-emoji { font-size:48px; margin-bottom:16px; }
#rsvp-thankyou h2 { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:400; margin-bottom:12px; }
#rsvp-thankyou p { font-size:15px; color:#6b6b6b; font-weight:300; }
.rsvp-no-match { text-align:center; padding:20px; color:#6b6b6b; font-size:14px; font-weight:300; }
.rsvp-no-match a { color:#d4a0a5; }

/* TRAVEL */
.hotel-card { border:1px solid #eee; transition:box-shadow 0.3s; margin-bottom:20px; overflow:hidden; }
.hotel-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.05); }
.hotel-card .hotel-image { width:100%; height:220px; overflow:hidden; }
.hotel-card .hotel-image img { width:100%; height:100%; object-fit:cover; }
.hotel-card .hotel-body { padding:24px 28px; }
.hotel-card h3 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; margin-bottom:6px; }
.hotel-card p { font-size:14px; color:#6b6b6b; font-weight:300; line-height:1.6; }
.hotel-card .rate { font-size:13px; color:#d4a0a5; font-weight:400; margin-top:4px; }
.hotel-card a.book-link { display:inline-block; margin-top:12px; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:#2c2c2c; border-bottom:1px solid #e8b4b8; text-decoration:none; padding-bottom:2px; font-weight:400; }
.booking-steps { padding:24px 28px; background:#fdf2f3; border:1px solid #f0e0e2; margin-top:16px; }
.booking-steps h4 { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; margin-bottom:12px; }
.booking-steps ol { padding-left:20px; }
.booking-steps li { font-size:14px; color:#6b6b6b; font-weight:300; line-height:1.8; }

/* REGISTRY / HONEYMOON FUND */

.fund-options { display:flex; flex-direction:column; gap:16px; max-width:480px; margin:0 auto; }

.fund-option a.fund-link { display:inline-block; margin-top:12px; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:#2c2c2c; border-bottom:1px solid #e8b4b8; text-decoration:none; padding-bottom:2px; font-weight:400; }

/* FAQ */
#faq { background:#f7f7f7; padding:80px 24px; border-top:1px solid #eee; }
#faq .faq-inner { max-width:640px; margin:0 auto; }
.faq-item { border-bottom:1px solid #eee; }
.faq-item button { width:100%; padding:20px 0; display:flex; justify-content:space-between; align-items:center; background:none; border:none; cursor:pointer; text-align:left; }
.faq-item button .q-text { font-family:'Outfit',sans-serif; font-size:15px; font-weight:400; color:#2c2c2c; padding-right:16px; }
.faq-item button .q-icon { font-size:18px; color:#e8b4b8; transition:transform 0.3s; flex-shrink:0; }

.faq-item .faq-answer.open { max-height:300px; padding-bottom:20px; }
.faq-item .faq-answer p { font-size:14px; color:#6b6b6b; font-weight:300; line-height:1.7; }

/* ADMIN */
#admin-panel { padding:40px 24px; max-width:800px; margin:0 auto; }
#admin-login { text-align:center; max-width:400px; margin:0 auto; padding:40px; }
#admin-login h3 { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:400; margin-bottom:16px; }
#admin-login input { font-family:'Outfit',sans-serif; font-size:14px; padding:12px 16px; border:1px solid #ddd; width:100%; text-align:center; margin-bottom:12px; outline:none; }
#admin-login button { font-family:'Outfit',sans-serif; font-size:13px; padding:12px 32px; background:#2c2c2c; color:#fff; border:none; cursor:pointer; letter-spacing:0.1em; text-transform:uppercase; }
.admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
.admin-header h3 { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:400; }
.admin-header button { font-family:'Outfit',sans-serif; font-size:12px; padding:8px 20px; background:#fdf2f3; border:1px solid #e8b4b8; cursor:pointer; color:#d4a0a5; letter-spacing:0.08em; text-transform:uppercase; }
.rsvp-card { padding:20px 24px; border:1px solid #eee; background:#fff; margin-bottom:16px; }
.rsvp-card-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; }
.rsvp-card-header h4 { font-size:16px; font-weight:500; }
.rsvp-card-header .rsvp-date { font-size:11px; color:#6b6b6b; }
.rsvp-tags { margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; }
.rsvp-tag { padding:4px 12px; font-size:12px; font-weight:400; letter-spacing:0.04em; }

.rsvp-dietary { font-size:13px; color:#6b6b6b; margin-top:8px; font-weight:300; }
.admin-export-btn { font-family:'Outfit',sans-serif; font-size:12px; padding:8px 20px; background:#2c2c2c; border:none; cursor:pointer; color:#fff; letter-spacing:0.08em; text-transform:uppercase; margin-left:8px; }
.admin-export-btn:hover { background:#d4a0a5; }

/* FOOTER */
footer { text-align:center; padding:48px 24px 32px; border-top:1px solid #eee; }

footer .admin-dot { margin-top:16px; background:none; border:none; cursor:pointer; font-size:11px; color:#ddd; letter-spacing:0.05em; }

// ─── STORAGE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = "wedding_rsvps";
function getLocalRsvps() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch { return []; } }
function saveLocalRsvp(data) {
  const all = getLocalRsvps();
  const idx = all.findIndex(r => r.guestName === data.guestName);
  if (idx >= 0) all[idx] = data; else all.push(data);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}
async function saveRsvpToSheets(data) {
  if (!CONFIG.googleSheetsUrl) { saveLocalRsvp(data); return true; }
  try {
    await fetch(CONFIG.googleSheetsUrl, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data) });
    saveLocalRsvp(data);
    return true;
  } catch(err) { console.warn("Sheets save failed:",err); saveLocalRsvp(data); return true; }
}
async function getAllRsvps() {
  if (CONFIG.googleSheetsUrl) {
    try { const r = await fetch(CONFIG.googleSheetsUrl); const j = await r.json(); if (j.success && j.rsvps) return j.rsvps; } catch(e) { console.warn("Sheets fetch failed:",e); }
  }
  return getLocalRsvps();
}

function renderPasswordScreen() {
  document.title = `${CONFIG.partner1FirstName} & ${CONFIG.partner2FirstName}`;
  document.body.innerHTML = `
    <div id="password-screen">
      <div class="inner" id="pw-inner">
        <p class="pre-title">The wedding of</p>
        <h1>${CONFIG.partner1FirstName} <span class="amp">&</span> ${CONFIG.partner2FirstName}</h1>
        <p class="date">${CONFIG.weddingDate}</p>
        <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
        <button class="enter-btn" id="pw-btn">Enter</button>
        <p class="err-msg" id="pw-error"></p>
      </div>
    </div>`;
  setTimeout(() => document.getElementById("pw-inner").classList.add("show"), 100);
  const input = document.getElementById("pw-input"), btn = document.getElementById("pw-btn"), err = document.getElementById("pw-error");
  function tryLogin() {
    if (input.value === CONFIG.sitePassword) renderSite();
    else { input.classList.add("error"); err.textContent = "Incorrect password. Please try again."; setTimeout(() => { input.classList.remove("error"); err.textContent = ""; }, 2000); }
  }
  btn.addEventListener("click", tryLogin);
  input.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
}

    <div class="section-title"><h2>${CONFIG.registryTitle}</h2><div class="line"></div></div>
    <p class="reg-msg">${CONFIG.registryMessage}</p>
    ${CONFIG.registryNote ? `<p style="text-align:center;font-size:14px;color:#6b6b6b;font-weight:300;font-style:italic;max-width:480px;margin:0 auto">${CONFIG.registryNote}</p>` : ""}
  </section>`;

  // FAQ
  let faqItems = "";
  CONFIG.faqs.forEach(f => {
    faqItems += `<div class="faq-item"><button onclick="toggleFaq(this)"><span class="q-text">${f.q}</span><span class="q-icon">+</span></button><div class="faq-answer"><p>${f.a}</p></div></div>`;
  });
  html += `<div id="faq" class="fade-section"><div class="faq-inner"><div class="section-title"><h2>Frequently Asked Questions</h2><div class="line"></div></div>${faqItems}</div></div>`;

  // FOOTER
  html += `<footer>
    <p class="footer-names">${CONFIG.partner1FirstName} & ${CONFIG.partner2FirstName}</p>
    <p class="footer-date">${CONFIG.weddingDate}</p>
    <p class="footer-msg">${CONFIG.footerMessage}</p>
    <button class="admin-dot" id="admin-toggle">•</button>
  </footer><div id="admin-panel" style="display:none"></div>`;

  document.body.innerHTML = html;
  initSiteLogic();
}

// ─── SITE LOGIC ────────────────────────────────────────────────────────────────
function initSiteLogic() {
  setTimeout(() => { const hc = document.getElementById("hero-content"); if (hc) hc.classList.add("show"); }, 200);
  window.addEventListener("scroll", () => { const nav = document.getElementById("main-nav"); if (nav) nav.classList.toggle("scrolled", window.scrollY > 50); });

  // Hamburger
  const hamburger = document.getElementById("nav-hamburger"), mobileMenu = document.getElementById("nav-mobile-menu");
  if (hamburger) {
    hamburger.addEventListener("click", () => mobileMenu.classList.toggle("open"));
    mobileMenu.querySelectorAll("a").forEach(a => a.addEventListener("click", () => mobileMenu.classList.remove("open")));
  }

  // Fade-in
  const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } }); }, { threshold:0.12 });
  document.querySelectorAll(".fade-section").forEach(el => obs.observe(el));

  // ─── PARTY-BASED RSVP ───
  const searchInput = document.getElementById("party-search");
  const partyResults = document.getElementById("party-results");
  const partyForm = document.getElementById("rsvp-party-form");
  const membersDiv = document.getElementById("rsvp-members");
  let currentParty = null;
  window._rsvpResponses = {};  // { "memberName": { "eventId": "accept"|"decline" } }

  let searchTimeout;
  searchInput.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    const val = searchInput.value.trim().toLowerCase();
    partyForm.style.display = "none";
    currentParty = null;
    window._rsvpResponses = {};

    if (val.length < 2) { partyResults.innerHTML = ""; return; }

    searchTimeout = setTimeout(() => {
      const matches = CONFIG.guestParties.filter(p => p.partyName.toLowerCase().includes(val));

      if (matches.length === 0) {
        partyResults.innerHTML = `<p class="rsvp-no-match">We couldn't find a party under that name. Please try a different spelling, or <a href="mailto:${CONFIG.eTransferEmail || ''}">contact us</a> for help.</p>`;
      } else if (matches.length === 1) {
        selectParty(matches[0]);
        partyResults.innerHTML = "";
      } else {
        partyResults.innerHTML = matches.map(p =>
          `<div style="padding:12px 16px;border:1px solid #eee;margin-bottom:8px;cursor:pointer;transition:background 0.2s" onmouseover="this.style.background='#fdf2f3'" onmouseout="this.style.background='#fff'" onclick="selectPartyByName('${p.partyName}')">
            <strong style="font-size:15px">The ${p.partyName} Party</strong>
            <span style="font-size:13px;color:#6b6b6b;margin-left:8px">(${p.members.map(m=>m.name.split(' ')[0]).join(', ')})</span>
          </div>`
        ).join("");
      }
    }, 300);
  });

  window.selectPartyByName = function(name) {
    const party = CONFIG.guestParties.find(p => p.partyName === name);
    if (party) { selectParty(party); partyResults.innerHTML = ""; }
  };

  function selectParty(party) {
    currentParty = party;
    window._rsvpResponses = {};
    window._shuttleResponses = {};
    partyForm.style.display = "block";

    let membersHtml = `<h3 class="rsvp-party-header">The ${party.partyName} Party</h3>`;

    party.members.forEach(member => {
      window._rsvpResponses[member.name] = {};
      const memberEvents = CONFIG.events.filter(e => member.events.includes(e.id));

      let eventRows = "";
      memberEvents.forEach(ev => {
        eventRows += `<div class="rsvp-event-row">
          <div><span class="ev-label">${ev.name}</span><br><span class="ev-sub">${ev.date} • ${ev.time}</span></div>
          <div class="rsvp-btns">
            <button class="rsvp-btn" data-member="${member.name}" data-event="${ev.id}" data-val="accept" onclick="setPartyResponse(this)">Accept</button>
            <button class="rsvp-btn" data-member="${member.name}" data-event="${ev.id}" data-val="decline" onclick="setPartyResponse(this)">Decline</button>
          </div>
        </div>`;
      });

      membersHtml += `<div class="rsvp-member-card"><div class="member-name">${member.name}</div>${eventRows}</div>`;
    });

    membersDiv.innerHTML = membersHtml;
  }

  // Submit
  document.getElementById("rsvp-submit").addEventListener("click", async () => {
    if (!currentParty) return;
    const errorEl = document.getElementById("rsvp-error");
    errorEl.textContent = "";

    // Validate all members have responded to all their events
    for (const member of currentParty.members) {
      const memberEvents = CONFIG.events.filter(e => member.events.includes(e.id));
      for (const ev of memberEvents) {
        if (!window._rsvpResponses[member.name] || !window._rsvpResponses[member.name][ev.id]) {
          errorEl.textContent = `Please respond to all events for ${member.name.split(" ")[0]}.`;
          return;
        }
      }
    }

    const submitBtn = document.getElementById("rsvp-submit");
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending…";

    // Save each member's RSVP
    const shuttleData = {
      shuttleBrookstreet: window._shuttleResponses["brookstreet"] || "",
      shuttleDowntown: window._shuttleResponses["downtown"] || "",
      shuttleSeats: document.getElementById("rsvp-shuttle-count").value || "",
    };

    for (let i = 0; i < currentParty.members.length; i++) {
      const member = currentParty.members[i];
      const memberEvents = CONFIG.events.filter(e => member.events.includes(e.id));
      const data = {
        guestName: member.name,
        partyName: currentParty.partyName,
        responses: memberEvents.map(e => ({
          eventId: e.id, eventName: e.name,
          attending: window._rsvpResponses[member.name][e.id],
        })),
        dietaryRestrictions: document.getElementById("rsvp-dietary").value,
        // Attach shuttle info to first member only (it's per-party)
        ...(i === 0 ? shuttleData : {}),
        submittedAt: new Date().toISOString(),
      };
      await saveRsvpToSheets(data);
    }

    document.getElementById("rsvp-form").style.display = "none";
    document.getElementById("rsvp-thankyou").style.display = "block";
    const firstName = currentParty.members[0].name.split(" ")[0];
    document.getElementById("ty-message").textContent =
      currentParty.members.length > 1
        ? `We've received the RSVP for the ${currentParty.partyName} party. We can't wait to celebrate with you all!`
        : `We've received your RSVP, ${firstName}. We can't wait to celebrate with you!`;
  });

  // Admin
  let adminOpen = false;
  document.getElementById("admin-toggle").addEventListener("click", () => {
    adminOpen = !adminOpen;
    if (adminOpen) { showAdminLogin(); document.getElementById("admin-toggle").textContent = "← Back to site"; }
    else { document.getElementById("admin-panel").style.display = "none"; document.getElementById("admin-toggle").textContent = "•"; }
  });
}

// ─── RSVP BUTTON HANDLER ───────────────────────────────────────────────────────
function setPartyResponse(btn) {
  const member = btn.dataset.member, eventId = btn.dataset.event, val = btn.dataset.val;
  const parent = btn.parentElement;
  parent.querySelectorAll(".rsvp-btn").forEach(b => b.classList.remove("accept-selected","decline-selected"));
  btn.classList.add(val === "accept" ? "accept-selected" : "decline-selected");
  if (!window._rsvpResponses[member]) window._rsvpResponses[member] = {};
  window._rsvpResponses[member][eventId] = val;
}

// ─── SHUTTLE RESPONSE HANDLER ──────────────────────────────────────────────────
window._shuttleResponses = {};
function setShuttleResponse(btn) {
  const dest = btn.dataset.shuttle, val = btn.dataset.val;
  const parent = btn.parentElement;
  parent.querySelectorAll(".rsvp-btn").forEach(b => b.classList.remove("accept-selected","decline-selected"));
  btn.classList.add(val === "yes" ? "accept-selected" : "decline-selected");
  window._shuttleResponses[dest] = val;
}

// ─── FAQ ───────────────────────────────────────────────────────────────────────
function toggleFaq(btn) {
  const answer = btn.nextElementSibling, icon = btn.querySelector(".q-icon");
  const isOpen = answer.classList.contains("open");
  answer.classList.toggle("open");
  icon.style.transform = isOpen ? "none" : "rotate(45deg)";
}

// ─── ADMIN ─────────────────────────────────────────────────────────────────────
function showAdminLogin() {
  const panel = document.getElementById("admin-panel");
  panel.style.display = "block";
  panel.innerHTML = `<div id="admin-login"><h3>Admin: View RSVPs</h3><input type="password" id="admin-pw" placeholder="Admin password"><br><button onclick="adminLogin()">View RSVPs</button></div>`;
  document.getElementById("admin-pw").addEventListener("keydown", e => { if (e.key === "Enter") adminLogin(); });
}
function adminLogin() {
  if (document.getElementById("admin-pw").value !== CONFIG.adminPassword) return;
  showAdminDashboard();
}
async function showAdminDashboard() {
  const panel = document.getElementById("admin-panel");
  panel.innerHTML = '<p style="color:#6b6b6b;text-align:center;padding:40px">Loading RSVPs…</p>';
  const rsvps = await getAllRsvps();
  const eventNames = {}; CONFIG.events.forEach(e => { eventNames[e.id] = e.name; });
  let cards = "";
  if (rsvps.length === 0) { cards = '<p style="color:#6b6b6b">No RSVPs yet.</p>'; }
  else {
    rsvps.forEach(r => {
      let tags = "";
      (r.responses||[]).forEach(resp => {
        if (resp.attending === "n/a") return;
        const cls = resp.attending === "accept" ? "attending" : "declined";
        const label = resp.attending === "accept" ? "✓ Attending" : "✗ Declined";
        tags += `<span class="rsvp-tag ${cls}">${eventNames[resp.eventId]||resp.eventId}: ${label}</span>`;
      });
      const dateStr = r.submittedAt ? new Date(r.submittedAt).toLocaleDateString() : "";
      cards += `<div class="rsvp-card"><div class="rsvp-card-header"><h4>${r.guestName}${r.partyName?` <span style="font-size:12px;color:#6b6b6b;font-weight:300">(${r.partyName})</span>`:""}</h4><span class="rsvp-date">${dateStr}</span></div><div class="rsvp-tags">${tags}</div>${r.dietaryRestrictions?`<p class="rsvp-dietary">🍽 ${r.dietaryRestrictions}</p>`:""}${r.shuttleBrookstreet||r.shuttleDowntown?`<p class="rsvp-dietary">🚌 Brookstreet: ${r.shuttleBrookstreet||"—"} | Downtown: ${r.shuttleDowntown||"—"} | Seats: ${r.shuttleSeats||"—"}</p>`:""}</div>`;
    });
  }
  const sheetsStatus = CONFIG.googleSheetsUrl ? '<span style="color:#2e7d32;font-size:12px">● Connected to Google Sheets</span>' : '<span style="color:#c44;font-size:12px">● Local storage only</span>';
  panel.innerHTML = `<div class="admin-header"><div><h3>RSVP Responses (${rsvps.length})</h3>${sheetsStatus}</div><div><button onclick="showAdminDashboard()">Refresh</button><button class="admin-export-btn" onclick="exportRsvpsCsv()">Export CSV</button></div></div>${cards}`;
}
async function exportRsvpsCsv() {
  const rsvps = await getAllRsvps();
  if (rsvps.length === 0) return;
  const allEventIds = CONFIG.events.map(e => e.id);
  const eventNames = {}; CONFIG.events.forEach(e => { eventNames[e.id] = e.name; });
  let csv = "Guest Name,Party," + allEventIds.map(id => eventNames[id]).join(",") + ",Dietary Restrictions,Shuttle Brookstreet,Shuttle Downtown,Shuttle Seats,Submitted\n";
  rsvps.forEach(r => {
    const respMap = {}; (r.responses||[]).forEach(resp => { respMap[resp.eventId] = resp.attending; });
    const row = [`"${r.guestName}"`,`"${r.partyName||""}"`, ...allEventIds.map(id => respMap[id]==="accept"?"Attending":respMap[id]==="decline"?"Declined":"N/A"), `"${(r.dietaryRestrictions||"").replace(/"/g,'""')}"`,r.shuttleBrookstreet||"",r.shuttleDowntown||"",r.shuttleSeats||"", r.submittedAt?new Date(r.submittedAt).toLocaleDateString():""];
    csv += row.join(",") + "\n";
  });
  const blob = new Blob([csv],{type:"text/csv"}); const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "rsvp_responses.csv"; a.click(); URL.revokeObjectURL(url);
}

// ─── BOOT ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => { renderPasswordScreen(); });
</script>
